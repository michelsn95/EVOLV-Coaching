<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="900" height="260" role="img" aria-label="EVOLV Coaching logo">
  <!-- three green bars -->
  <rect x="20" y="40" width="100" height="26" rx="3" fill="#8FA58E" />
  <rect x="20" y="90" width="100" height="26" rx="3" fill="#8FA58E" />
  <rect x="20" y="140" width="100" height="26" rx="3" fill="#8FA58E" />

  <!-- EVOLV wordmark -->
  <text x="150" y="130" font-family="Barlow Condensed, Figtree, sans-serif" font-weight="800" font-size="140" fill="#0A0A0A">EVOLV</text>

  <!-- COACHING sublabel -->
  <text x="150" y="200" font-family="Figtree, sans-serif" font-weight="500" font-size="36" fill="#666666" letter-spacing="8">COACHING</text>
</svg>
